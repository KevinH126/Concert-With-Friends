# Render Blueprint for the Concert-With-Friends backend (P1.5).
# Web API + managed Postgres only. Redis + Celery worker/beat are added in P4.
#
# NOTE ON PLAN SLUGS: Render has changed plan identifiers over time. Verify the
# current slugs in the Render dashboard/docs before first apply if a deploy is
# rejected (web `plan:` and database `plan:`).
databases:
  - name: cwf-db
    databaseName: concert_friends
    user: concert_friends
    # Paid, persistent, daily backups. Free Postgres is DELETED ~90 days in.
    # Slug is hyphenated; legacy names (starter/standard) can't be used for new DBs.
    plan: basic-256mb
    region: oregon # <-- change to the region nearest you

services:
  - type: web
    name: cwf-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon # <-- keep same region as the database
    # Free web tier spins down when idle (cold start ~30-50s). Flip to a paid
    # plan (e.g. `standard`) BEFORE sharing the link publicly.
    plan: free
    healthCheckPath: /health
    # preDeployCommand (auto-migrate) is NOT allowed on free-tier services, so it's
    # omitted here. Until the web service is on a paid plan, run migrations manually
    # from your laptop against the DB's external URL (see docs/DEPLOY.md). When you
    # upgrade, add:  preDeployCommand: alembic upgrade head
    autoDeploy: true # deploy on push to main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cwf-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true # Render generates + stores; never in git
      - key: ADMIN_TOKEN
        generateValue: true # ops token for /admin; distinct from SECRET_KEY
      - key: TICKETMASTER_API_KEY
        sync: false # paste in the Render dashboard (not committed)
